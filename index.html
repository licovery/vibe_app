<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vercel Demo</title>
    <style>
      /* 页面基础样式 | Base page styles */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      main {
        max-width: 720px;
        margin: 96px auto;
        padding: 32px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      .marker {
        margin-top: 24px;
        padding: 12px 16px;
        border-radius: 10px;
        background: #eef2ff;
        color: #3730a3;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vercel Demo</h1>
      <p>This page is used to verify GitHub to Vercel auto deployment.</p>
      <p class="marker">Deploy marker: version 2</p>
    </main>
  </body>
